years:
  start: 2020
  end: 2024

modalities:
  - viirs
  - s5p

paths:
  geo_coords_path: ingestion/metadata/geography/2020_Gaz_counties_national.txt
  run_root: graph/checkpoints
  runs_parquet: graph/data/topology_runs.parquet
  basis_parquet: graph/data/topology_basis.parquet
  edges_parquet: graph/data/topology_edges.parquet

graph:
  graph_tag_base: gsl_meanmax_consensus_viirs_s5p
  graph_objective: barlow
  mem_top_k: 11
  block_pca_dim: 0
  hidden_dim: 144
  joint_dim: 40
  consensus_dim: 40
  dropout: 0.016
  temperature: 0.123
  tau_graph: 0.983
  w_pull: 0.018
  beta_geo: 0.191
  support_k: 28
  final_row_topk: 10
  knn_k: 6
  knn_bandwidth_k: 6
  epochs: 120
  lr: 0.001
  weight_decay: 0.00001
  geo_gamma: 1.0
  projector_hidden_dim: 128
  projector_dim: 64
  barlow_lambda: 0.005
  consensus_ssl_weight: 1.0
  consensus_alignment_weight: 0.10
  complementary_orthogonality_weight: 0.05
  graph_consensus_weight: 0.10
  spatial_negative_mining: false
  geo_residual_graph: true
  mutual_knn: false
  degree_penalty: false
  degree_penalty_weight: 0.05
  device: cuda
  seed: 0
  write_knn_reference: true

viirs:
  enabled: true
  kind: bag
  input_parquet: manifold/data/viirs_embeddings.parquet
  family_tag_base: byol_viirs24km32_flatrad
  bag_keep_rate: 0.75

s5p:
  enabled: true 
  kind: bag
  input_parquet: manifold/data/s5p_embeddings.parquet
  family_tag_base: byol_nitrous24km32
  bag_keep_rate: 0.50
